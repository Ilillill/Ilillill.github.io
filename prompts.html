<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Prompt Builder</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --group-bg: #18181b;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --text-color: #e5e7eb;
            --text-muted: #9ca3af;
            --tag-bg: #2d2d30;
            --tag-hover: #3f3f46;
            --tag-active: #10b981;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 250px; /* Extra space for the larger bottom panel */
            line-height: 1.4;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 { margin: 0; color: #fff; font-size: 1.4rem; }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .wotd-box {
            background-color: var(--card-bg);
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px dashed var(--accent-color);
            font-size: 0.85rem;
        }

        .wotd-word {
            color: var(--accent-hover);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        /* Instant Heroine Button */
        .btn-heroine { background-color: #ec4899; color: white; }
        .btn-heroine:hover { background-color: #f472b6; }

        /* Instant Paleo Button */
        .btn-paleo { background-color: #f59e0b; color: white; }
        .btn-paleo:hover { background-color: #fbbf24; }

        .search-bar {
            width: 100%;
            max-width: 300px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: #fff;
            font-size: 0.85rem;
        }

        /* Macro-Group Styling */
        .macro-group {
            background-color: var(--group-bg);
            border-radius: 8px;
            border-left: 4px solid var(--border-color);
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .macro-title {
            font-size: 1.1rem;
            color: #fff;
            margin-top: 0;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .builder-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .category-card {
            background-color: var(--card-bg);
            border-radius: 6px;
            border: 1px solid var(--border-color);
            padding: 10px;
        }

        .category-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0 0 8px 0;
            text-transform: uppercase;
            font-weight: 600;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tag {
            background-color: var(--tag-bg);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
            border: 1px solid transparent;
        }

        .tag:hover { background-color: var(--tag-hover); }
        .tag.active {
            background-color: var(--tag-active);
            color: #fff;
            border-color: var(--tag-active);
        }
        .tag.hidden { display: none; }

        /* Complex Output Panel */
        .output-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #09090b;
            border-top: 1px solid var(--border-color);
            padding: 15px;
            z-index: 1000;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.6);
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto 10px auto;
            flex-wrap: wrap;
            gap: 10px;
        }

        .custom-input-group {
            display: flex;
            gap: 5px;
            flex-grow: 1;
            max-width: 400px;
        }

        .custom-input-group input {
            flex-grow: 1;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.8rem;
        }

        
        .btn-add { background-color: #4b5563; color: white; }
        .btn-add:hover { background-color: #6b7280; }
        .btn-chaos { background-color: #ef4444; color: white; }
        .btn-chaos:hover { background-color: #f87171; }
        .btn-random { background-color: #8b5cf6; color: white; }
        .btn-random:hover { background-color: #a78bfa; }
        .btn-copy { background-color: var(--accent-color); color: white; }
        .btn-copy:hover { background-color: var(--accent-hover); }
        .btn-clear { background-color: transparent; color: #9ca3af; border: 1px solid #4b5563; }
        .btn-clear:hover { background-color: #374151; color: white; }

        /* Draggable Staging Area */
        .staging-area {
            width: 100%;
            max-width: 1600px;
            min-height: 80px;
            max-height: 120px;
            overflow-y: auto;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-content: flex-start;
        }

        .active-tag {
            background-color: var(--accent-color);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: grab;
            user-select: none;
            border: 1px solid transparent;
        }

        .active-tag:active { cursor: grabbing; }
        
        .active-tag.dragging {
            opacity: 0.4;
            border: 1px dashed #fff;
        }

        .active-tag .remove-btn {
            background: none;
            border: none;
            color: #d1d5db;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
            cursor: pointer;
            font-weight: bold;
        }

        .active-tag .remove-btn:hover { color: #fff; }

        /* Hidden textarea for actual clipboard copying */
        #hidden-clipboard { position: absolute; left: -9999px; }

    </style>
</head>
<body>

    <header>
        <h1>Ultimate AI Prompt Builder</h1>
        <div class="header-controls">
            <div class="wotd-box">Word of the Day: <span class="wotd-word" id="wotd" onclick="addWotd()" title="Click to add to prompt">Loading...</span></div>
            <input type="text" id="search" class="search-bar" placeholder="Search across all categories...">
        </div>
    </header>

    <div id="main-container"></div>

    <div class="output-panel">
        <div class="output-header">
            <div class="custom-input-group">
                <input type="text" id="custom-input" placeholder="Type custom detail here..." onkeypress="handleEnter(event)">
                <button class="btn-add" onclick="addCustomText()">Add</button>
            </div>
            <div class="btn-group">
                <button class="btn-copy" onclick="window.open('https://docs.google.com/document/d/1gU0-H3SX7xetV8cD-aLJc8YslqrMBtSg5zAfuyViB_0/edit?tab=t.0#heading=h.n30hyuxsfupn', '_blank')">Cheatsheet</button>
                <button class="btn-heroine" id="btn-heroine-ui" onclick="generateAndCopyHeroine()">👸 Instant Heroine</button>
                <button class="btn-paleo" id="btn-paleo-ui" onclick="generateAndCopyPaleo()">🦖 Instant Paleo</button>
                <button class="btn-chaos" onclick="triggerChaos()" title="Randomly select conflicting items">🌪️ Chaos</button>
                <button class="btn-random" onclick="randomizePrompt()">🎲 Randomize</button>
                <button class="btn-clear" onclick="clearPrompt()">Clear All</button>
                <button class="btn-copy" onclick="copyPrompt()">Copy Prompt</button>
            </div>
        </div>
        <div class="staging-area" id="staging-area"></div>
        <textarea id="hidden-clipboard"></textarea>
    </div>

        const stagingArea = document.getElementById('staging-area');
        const searchInput = document.getElementById('search');
        const hiddenClipboard = document.getElementById('hidden-clipboard');
        let dragSourceEl = null;

        // Fetch Word of the Day
        async function fetchWord() {
            try {
                const res = await fetch('https://random-word-api.herokuapp.com/word');
                const data = await res.json();
                document.getElementById('wotd').textContent = data[0];
            } catch(e) {
                document.getElementById('wotd').textContent = "serendipity"; // Fallback
            }
        }

        function addWotd() {
            const word = document.getElementById('wotd').textContent;
            if (word && word !== "Loading...") {
                createActiveTag(word);
            }
        }

        // Initialize Builder UI
        function initBuilder() {
            for (const [groupName, groupData] of Object.entries(groupedData)) {
                
                // Create Macro Group Frame
                const groupDiv = document.createElement('div');
                groupDiv.className = 'macro-group';
                groupDiv.style.borderLeftColor = groupData.color;

                const groupTitle = document.createElement('h2');
                groupTitle.className = 'macro-title';
                groupTitle.innerHTML = `<span style="color:${groupData.color}">■</span> ${groupName}`;
                groupDiv.appendChild(groupTitle);

                const gridContainer = document.createElement('div');
                gridContainer.className = 'builder-container';

                // Populate Categories inside Group
                for (const [category, items] of Object.entries(groupData.categories)) {
                    const card = document.createElement('div');
                    card.className = 'category-card';

                    const title = document.createElement('h3');
                    title.className = 'category-title';
                    title.textContent = category;
                    card.appendChild(title);

                    const tagContainer = document.createElement('div');
                    tagContainer.className = 'tag-container';

                    items.forEach(item => {
                        const tag = document.createElement('span');
                        tag.className = 'tag';
                        tag.textContent = item;
                        tag.dataset.text = item.toLowerCase();
                        
                        tag.addEventListener('click', () => {
                            // Instead of toggling, clicking the board adds it to the staging area
                            createActiveTag(item);
                            // Brief visual flash to show it was clicked
                            tag.style.backgroundColor = groupData.color;
                            tag.style.color = "white";
                            setTimeout(() => {
                                tag.style.backgroundColor = "";
                                tag.style.color = "";
                            }, 200);
                        });
                        tagContainer.appendChild(tag);
                    });

                    card.appendChild(tagContainer);
                    gridContainer.appendChild(card);
                }

                groupDiv.appendChild(gridContainer);
                mainContainer.appendChild(groupDiv);
            }
        }

        // --- Drag & Drop Staging Area Logic ---
        
        function handleEnter(e) {
            if (e.key === 'Enter') addCustomText();
        }

        function addCustomText() {
            const input = document.getElementById('custom-input');
            const text = input.value.trim();
            if (text) {
                createActiveTag(text);
                input.value = '';
            }
        }

        function createActiveTag(text) {
            const tag = document.createElement('div');
            tag.className = 'active-tag';
            tag.draggable = true;
            
            // The text node
            const textNode = document.createElement('span');
            textNode.textContent = text;
            tag.appendChild(textNode);

            // Remove button
            const removeBtn = document.createElement('button');
            removeBtn.className = 'remove-btn';
            removeBtn.innerHTML = '&times;';
            removeBtn.onclick = () => tag.remove();
            tag.appendChild(removeBtn);

            // HTML5 Drag Events
            tag.addEventListener('dragstart', handleDragStart);
            tag.addEventListener('dragend', handleDragEnd);

            stagingArea.appendChild(tag);
        }

        function clearPrompt() {
            stagingArea.innerHTML = '';
        }

        // Flat array of all items for randomization
        function getAllItems() {
            let all = [];
            for (let g in groupedData) {
                for (let c in groupedData[g].categories) {
                    all = all.concat(groupedData[g].categories[c]);
                }
            }
            return all;
        }

        function randomizePrompt() {
            clearPrompt();
            // Just simulate the structured logic previously built, using flat arrays 
            const all = getAllItems();
            const picks = [];
            for(let i=0; i<8; i++) {
                picks.push(all[Math.floor(Math.random() * all.length)]);
            }
            picks.forEach(p => createActiveTag(p));
        }

        function triggerChaos() {
            clearPrompt();
            const all = getAllItems();
            // Generates a random number between 3 and 15
            const numItems = Math.floor(Math.random() * 13) + 3; 
            for(let i=0; i<numItems; i++) {
                createActiveTag(all[Math.floor(Math.random() * all.length)]);
            }
        }

        function copyPrompt() {
            // Extract text from staging area
            const tags = stagingArea.querySelectorAll('.active-tag span');
            const promptText = Array.from(tags).map(span => span.textContent).join(', ');
            
            hiddenClipboard.value = promptText;
            hiddenClipboard.select();
            
            navigator.clipboard.writeText(promptText).then(() => {
                const btn = document.querySelector('.btn-copy');
                const orig = btn.textContent;
                btn.textContent = "Copied!";
                btn.style.backgroundColor = "#10b981";
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.style.backgroundColor = "";
                }, 1500);
            });
        }

        // --- Drag and Drop Handlers ---
        function handleDragStart(e) {
            dragSourceEl = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
            setTimeout(() => this.classList.add('dragging'), 0);
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            dragSourceEl = null;
        }

        stagingArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            
            const dragging = document.querySelector('.dragging');
            if (!dragging) return;

            const afterElement = getDragAfterElement(stagingArea, e.clientX, e.clientY);
            if (afterElement == null) {
                stagingArea.appendChild(dragging);
            } else {
                stagingArea.insertBefore(dragging, afterElement);
            }
        });

        function getDragAfterElement(container, x, y) {
            const draggableElements = [...container.querySelectorAll('.active-tag:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                // Measure 2D distance to the center of each box
                const centerX = box.left + box.width / 2;
                const centerY = box.top + box.height / 2;
                const distance = Math.sqrt(Math.pow(x - centerX, 2) + Math.pow(y - centerY, 2));
                
                if (distance < closest.distance) {
                    return { offset: distance, element: child };
                } else {
                    return closest;
                }
            }, { distance: Number.POSITIVE_INFINITY }).element;
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const groups = document.querySelectorAll('.macro-group');

            groups.forEach(group => {
                let groupHasMatch = false;
                const cards = group.querySelectorAll('.category-card');

                cards.forEach(card => {
                    let cardHasMatch = false;
                    const tags = card.querySelectorAll('.tag');

                    tags.forEach(tag => {
                        if (tag.dataset.text.includes(term)) {
                            tag.classList.remove('hidden');
                            cardHasMatch = true;
                            groupHasMatch = true;
                        } else {
                            tag.classList.add('hidden');
                        }
                    });

                    card.style.display = cardHasMatch || term === "" ? 'block' : 'none';
                });

                group.style.display = groupHasMatch || term === "" ? 'block' : 'none';
            });
        });
