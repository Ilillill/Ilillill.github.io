<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Board</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --accent: #ff9800; 
            --hover-bg: #2a2a2a;
            --drop-zone-bg: #181818; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            display: flex;
            flex-direction: column; 
            height: 100vh;
            box-sizing: border-box;
            gap: 12px; 
        }

        #top-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-panel {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        /* Adjusted widths for a two-panel layout */
        .intake-panel {
            flex: 1 1 auto; /* Takes up the vast majority of the space */
            min-width: 300px;
        }

        .category-panel {
            flex: 0 1 250px; /* Slimmer, fixed max width */
            min-width: 200px;
            justify-content: flex-start;
        }

        .control-panel h3 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .input-form { display: flex; gap: 8px; margin-bottom: 6px; }
        
        .text-input {
            flex: 1;
            padding: 8px 10px; 
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #2d2d2d;
            color: var(--text);
            font-size: 0.9rem;
            min-width: 0; 
        }
        
        button.submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px; 
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button.submit-btn:hover { background: #e68a00; }
        
        #export-btn { 
            background: #4dd0e1; 
            width: 100%; 
            margin-top: auto; /* Pushes it slightly down if there is extra space */
        }
        #export-btn:hover { background: #26c6da; }

        #main-board {
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto;
            padding-right: 5px; 
        }

        .category-box {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; 
            border: 1px dashed #444; 
            min-height: 80px; 
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .category-box.drag-over {
            border-color: var(--accent);
            background: var(--hover-bg);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h2 { 
            font-size: 0.95rem; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            color: var(--accent); 
        }

        .task-list {
            flex: 1;
            min-height: 40px; 
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 6px; 
            padding: 6px; 
            background: var(--drop-zone-bg); 
            border-radius: 4px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); 
        }

        .task-card {
            background: #2d2d2d;
            border-left: 3px solid var(--accent); 
            padding: 4px 8px; 
            border-radius: 4px;
            cursor: grab;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            user-select: none;
            display: inline-flex; 
            align-items: center;
            width: fit-content; 
            max-width: 100%; 
            box-sizing: border-box;
            gap: 6px; 
        }

        .task-card span {
            word-break: break-word; 
            font-size: 0.85rem; 
        }

        .task-card:active { cursor: grabbing; opacity: 0.8; transform: scale(0.98); }
        
        .action-btns {
            display: flex;
            gap: 6px;
            margin-left: auto; 
        }

        .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            font-size: 0.85rem; 
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        
        .action-btns button:hover { opacity: 1; }
        .edit-btn { color: #4dd0e1; }
        .delete-btn { color: #ff5252; }
    </style>
</head>
<body>

    <div id="top-controls">
        <div class="control-panel intake-panel">
            <h3>Intake Bench</h3>
            <form id="add-task-form" class="input-form">
                <input type="text" id="new-task-input" class="text-input" placeholder="Drop a thought here..." autocomplete="off" required>
                <button type="submit" class="submit-btn">Add Task</button>
            </form>
            <div class="task-list drop-zone" id="intake"></div>
        </div>

        <div class="control-panel category-panel">
            <h3>Add Category</h3>
            <form id="add-category-form" class="input-form">
                <input type="text" id="new-category-name" class="text-input" placeholder="Name..." autocomplete="off" required>
                <button type="submit" class="submit-btn">Add</button>
            </form>
            <button id="export-btn" class="submit-btn">Export to TXT</button>
        </div>
    </div>

    <div id="main-board"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, writeBatch, query, where, getDocs } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxKv-xXahSO2TEtwVwXTfU1eJ1ZsaaMAc",
            authDomain: "tasks-de4d9.firebaseapp.com",
            databaseURL: "https://tasks-de4d9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tasks-de4d9",
            storageBucket: "tasks-de4d9.firebasestorage.app",
            messagingSenderId: "908733856196",
            appId: "1:908733856196:web:b8d268a692a0e079be4c91"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const tasksRef = collection(db, "command_board_tasks");
        const categoriesRef = collection(db, "command_board_categories"); 

        let currentTasks = {};
        let currentCategories = {};

        function renderBoard() {
            const mainBoard = document.getElementById('main-board');
            const intakeZone = document.getElementById('intake');
            
            mainBoard.innerHTML = '';
            intakeZone.innerHTML = '';

            const sortedCategories = Object.entries(currentCategories).sort((a, b) => {
                return a[1].name.localeCompare(b[1].name);
            });

            sortedCategories.forEach(([catId, cat]) => {
                const catBox = document.createElement('div');
                catBox.className = 'category-box';
                catBox.innerHTML = `
                    <div class="category-header">
                        <h2>${cat.name}</h2>
                        <div class="action-btns">
                            <button class="edit-btn" onclick="editCategory('${catId}', '${cat.name.replace(/'/g, "\\'")}')">✎</button>
                            <button class="delete-btn" onclick="deleteCategory('${catId}')">×</button>
                        </div>
                    </div>
                    <div class="task-list drop-zone" id="${catId}"></div>
                `;
                mainBoard.appendChild(catBox);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                    zone.parentElement.classList.add('drag-over');
                });
                zone.addEventListener('dragleave', () => zone.parentElement.classList.remove('drag-over'));
                zone.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    zone.parentElement.classList.remove('drag-over');
                    const taskId = e.dataTransfer.getData('text/plain');
                    const newCategory = zone.id;
                    try { await updateDoc(doc(db, "command_board_tasks", taskId), { category: newCategory }); } 
                    catch (error) { alert("FIREBASE ERROR: " + error.message); }
                });
            });

            Object.entries(currentTasks).forEach(([taskId, task]) => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.draggable = true;
                card.id = taskId;
                card.innerHTML = `
                    <span>${task.text}</span>
                    <div class="action-btns">
                        <button class="edit-btn" onclick="editTask('${taskId}', '${task.text.replace(/'/g, "\\'")}')">✎</button>
                        <button class="delete-btn" onclick="deleteTask('${taskId}')">×</button>
                    </div>
                `;
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', taskId);
                    setTimeout(() => card.style.opacity = '0.5', 0);
                });
                card.addEventListener('dragend', () => card.style.opacity = '1');

                let dropZone = document.getElementById(task.category);
                if (!dropZone) dropZone = intakeZone;
                
                dropZone.appendChild(card);
            });
        }

        onSnapshot(categoriesRef, (snapshot) => {
            currentCategories = {};
            snapshot.forEach(doc => { currentCategories[doc.id] = doc.data(); });
            renderBoard();
        }, (error) => console.error("Category Error: ", error));

        onSnapshot(tasksRef, (snapshot) => {
            currentTasks = {};
            snapshot.forEach(doc => { currentTasks[doc.id] = doc.data(); });
            renderBoard();
        }, (error) => console.error("Task Error: ", error));

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('new-task-input');
            if (input.value.trim() === '') return;
            const taskText = input.value;
            input.value = '';
            input.focus();
            try { await addDoc(tasksRef, { text: taskText, category: 'intake', createdAt: serverTimestamp() }); } 
            catch (error) { alert("FIREBASE ERROR: " + error.message); }
        });

        document.getElementById('add-category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('new-category-name');
            if (nameInput.value.trim() === '') return;
            
            try {
                await addDoc(categoriesRef, { 
                    name: nameInput.value.trim(), 
                    createdAt: serverTimestamp() 
                });
                nameInput.value = '';
            } catch (error) { alert("FIREBASE ERROR: " + error.message); }
        });

        document.getElementById('export-btn').addEventListener('click', () => {
            let exportData = "";

            exportData += "=== INTAKE BENCH ===\n";
            const intakeTasks = Object.values(currentTasks).filter(t => t.category === 'intake' || !currentCategories[t.category]);
            if (intakeTasks.length === 0) exportData += "(Empty)\n";
            intakeTasks.forEach(t => exportData += `- ${t.text}\n`);
            exportData += "\n";

            const sortedCategories = Object.entries(currentCategories).sort((a, b) => {
                return a[1].name.localeCompare(b[1].name);
            });

            sortedCategories.forEach(([catId, cat]) => {
                exportData += `=== ${cat.name.toUpperCase()} ===\n`;
                const catTasks = Object.values(currentTasks).filter(t => t.category === catId);
                
                if (catTasks.length === 0) {
                    exportData += "(Empty)\n";
                } else {
                    catTasks.forEach(t => exportData += `- ${t.text}\n`);
                }
                exportData += "\n";
            });

            const blob = new Blob([exportData], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            
            const dateStr = new Date().toISOString().split('T')[0];
            a.download = `CommandBoard_Tasks_${dateStr}.txt`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        window.editTask = async (taskId, currentText) => {
            const newText = prompt("Edit your task:", currentText);
            if (newText !== null && newText.trim() !== "") {
                try { await updateDoc(doc(db, "command_board_tasks", taskId), { text: newText.trim() }); } 
                catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        };

        window.deleteTask = async (taskId) => {
            if (confirm("Are you sure you want to delete this task?")) {
                try { await deleteDoc(doc(db, "command_board_tasks", taskId)); } 
                catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        };

        window.editCategory = async (catId, currentName) => {
            const newName = prompt("Edit category name:", currentName);
            if (newName !== null && newName.trim() !== "") {
                try { await updateDoc(doc(db, "command_board_categories", catId), { name: newName.trim() }); } 
                catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        };

        window.deleteCategory = async (catId) => {
            if (confirm("Delete this category? All tasks inside will be moved to the Intake bench.")) {
                try {
                    const q = query(tasksRef, where("category", "==", catId));
                    const snapshot = await getDocs(q);
                    
                    const batch = writeBatch(db);
                    snapshot.forEach((taskDoc) => {
                        batch.update(taskDoc.ref, { category: 'intake' });
                    });
                    await batch.commit();
                    await deleteDoc(doc(db, "command_board_categories", catId));
                } catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        };
    </script>
</body>
</html>
