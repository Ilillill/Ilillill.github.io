<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Board</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --accent: #ff9800; 
            --hover-bg: #2a2a2a;
            --drop-zone-bg: #181818; 
        }

        /* 1. Slimmed Down Body Padding */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            display: flex;
            flex-direction: column; 
            height: 100vh;
            box-sizing: border-box;
            gap: 12px; 
        }

        /* 2. Controls & Intake Bar */
        #top-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-panel {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; 
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 300px;
        }

        .control-panel h3 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .input-form { display: flex; gap: 8px; margin-bottom: 6px; }
        
        .text-input {
            flex: 1;
            padding: 8px 10px; 
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #2d2d2d;
            color: var(--text);
            font-size: 0.9rem;
        }

        #new-category-color {
            height: 35px;
            width: 40px;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #2d2d2d;
            cursor: pointer;
        }
        
        button.submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px; 
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.submit-btn:hover { background: #e68a00; }

        /* 3. Main Board (Now 100% width stacking) */
        #main-board {
            flex: 1;
            display: flex;
            flex-direction: column; /* Forces categories to stack at 100% width */
            gap: 12px; 
            overflow-y: auto;
            padding-right: 5px; 
        }

        /* 4. Condensed Category Boxes & Titles */
        .category-box {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; 
            border: 1px dashed #444; 
            min-height: 80px; 
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
        }

        .category-box.drag-over {
            border-color: var(--accent);
            background: var(--hover-bg);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        h2 { 
            font-size: 0.95rem; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        /* 5. High-Density Task Drop Zones */
        .task-list {
            flex: 1;
            min-height: 40px; 
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 6px; 
            padding: 6px; 
            background: var(--drop-zone-bg); 
            border-radius: 4px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); 
        }

        /* 6. Slimmer Task Cards & Buttons */
        .task-card {
            background: #2d2d2d;
            border-left: 3px solid var(--accent); 
            padding: 4px 8px; 
            border-radius: 4px;
            cursor: grab;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            user-select: none;
            display: inline-flex; 
            align-items: center;
            width: fit-content; 
            max-width: 100%; 
            box-sizing: border-box;
            gap: 6px; 
        }

        .task-card span {
            word-break: break-word; 
            font-size: 0.85rem; 
        }

        .task-card:active { cursor: grabbing; opacity: 0.8; transform: scale(0.98); }
        
        .action-btns {
            display: flex;
            gap: 6px;
            margin-left: auto; 
        }

        .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            font-size: 0.85rem; 
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        
        .action-btns button:hover { opacity: 1; }
        .edit-btn { color: #4dd0e1; }
        .delete-btn { color: #ff5252; }
    </style>
</head>
<body>

    <div id="top-controls">
        <div class="control-panel">
            <h3>Intake Bench</h3>
            <form id="add-task-form" class="input-form">
                <input type="text" id="new-task-input" class="text-input" placeholder="Drop a thought here..." autocomplete="off" required>
                <button type="submit" class="submit-btn">Add Task</button>
            </form>
            <div class="task-list drop-zone" id="intake"></div>
        </div>

        <div class="control-panel">
            <h3>Manage Categories</h3>
            <form id="add-category-form" class="input-form">
                <input type="text" id="new-category-name" class="text-input" placeholder="New Category Name..." autocomplete="off" required>
                <input type="color" id="new-category-color" value="#ff9800" title="Choose Category Color">
                <button type="submit" class="submit-btn">Add Category</button>
            </form>
        </div>
    </div>

    <div id="main-board">
        </div>

    <script type="module">
