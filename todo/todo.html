<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Board</title>
    <style>
        :root {
            /* Minimalist Pure White Theme */
            --bg-color: #ffffff; 
            --surface: #ffffff; 
            --border: #e0e0e0;
            --text: #333333;
            --accent: #ff9800; 
            --hover-bg: #fcfcfc;
            --drop-zone-bg: #ffffff; 
            --task-bg: #ffffff;
            --edit-btn-color: #26c6da;
            --delete-btn-color: #ef5350;
            
            --shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; 
            display: flex;
            flex-direction: column; 
            height: 100vh;
            box-sizing: border-box;
            gap: 12px; 
        }

        #top-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .control-panel {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; 
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
        }

        .intake-panel {
            flex: 1 1 auto; 
            min-width: 300px;
        }

        .category-panel {
            flex: 0 1 250px; 
            min-width: 200px;
            justify-content: flex-start;
        }

        .control-panel h3 { display: none; }

        .input-form { display: flex; gap: 8px; margin-bottom: 6px; }
        
        .text-input {
            flex: 1;
            padding: 8px 10px; 
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #ffffff;
            color: var(--text);
            font-size: 0.9rem;
            min-width: 0; 
        }
        
        button.submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px; 
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        button.submit-btn:hover { background: #e68a00; }
        
        #export-btn { 
            background: var(--edit-btn-color); 
            width: 100%; 
            margin-top: auto; 
        }
        #export-btn:hover { background: #26c6da; }

        #main-board {
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto;
            padding-right: 5px; 
        }

        .category-box {
            background: var(--surface);
            border-radius: 6px;
            min-height: 80px; 
            display: flex;
            flex-direction: row; 
            transition: all 0.2s ease;
            width: 100%;
            box-sizing: border-box;
            box-shadow: var(--shadow);
        }

        .category-box.drag-over {
            background: var(--hover-bg);
        }

        .category-sidebar {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; 
            cursor: pointer;
            transition: background 0.2s;
            overflow: hidden; 
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
        }

        .category-sidebar:hover {
            background: var(--hover-bg);
        }

        .sidebar-title { 
            font-size: 0.7rem; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            color: var(--accent); 
            white-space: nowrap;
            transform: rotate(-90deg); 
        }

        .task-list {
            flex: 1;
            min-height: 40px; 
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 6px; 
            padding: 6px; 
            background: var(--drop-zone-bg); 
            border-radius: 4px;
        }

        /* Super minimal task card */
        .task-card {
            background: var(--task-bg);
            border-left: 3px solid var(--accent); 
            padding: 6px 10px; /* Slightly wider padding since buttons are gone */
            border-radius: 4px;
            cursor: pointer; /* Changed to pointer to indicate it's clickable */
            box-shadow: var(--shadow);
            user-select: none;
            display: inline-flex; 
            align-items: center;
            width: fit-content; 
            max-width: 100%; 
            box-sizing: border-box;
            border: 1px solid var(--border); 
            transition: transform 0.1s;
        }

        .task-card:hover {
            transform: translateY(-1px);
        }

        .task-card span {
            word-break: break-word; 
            font-size: 0.85rem; 
        }

        .task-card:active { cursor: grabbing; opacity: 0.8; transform: scale(0.98); }

        [style*="color: rgb(255, 152, 0)"] { 
             color: var(--accent) !important;
        }
        
        #main-board .category-box:last-child .sidebar-title {
            color: #d84315; 
        }

        /* Shared Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        
        .modal-box {
            background: var(--surface); padding: 20px; border-radius: 6px;
            width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border: none;
        }
        
        .modal-box h3 { margin-top: 0; margin-bottom: 12px; font-size: 1rem; color: var(--text);}
        .modal-box input { width: 100%; box-sizing: border-box; margin-bottom: 15px; }
        .modal-btn-group { display: flex; gap: 8px; justify-content: flex-end; }
        
        .btn-cancel { 
            background: transparent; border: 1px solid var(--border); 
            color: var(--text); padding: 8px 16px; border-radius: 4px; cursor: pointer;
        }
        .btn-delete { 
            background: var(--delete-btn-color); color: #fff; 
            border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }

    </style>
</head>
<body>

    <div id="category-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Manage Category</h3>
            <input type="text" id="modal-cat-name" class="text-input" autocomplete="off">
            <div class="modal-btn-group">
                <button class="btn-cancel" onclick="closeCategoryModal()">Cancel</button>
                <button class="btn-delete" id="modal-delete-btn">Delete</button>
                <button class="submit-btn" id="modal-save-btn">Save</button>
            </div>
        </div>
    </div>

    <div id="task-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Manage Task</h3>
            <input type="text" id="modal-task-text" class="text-input" autocomplete="off">
            <div class="modal-btn-group">
                <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
                <button class="btn-delete" id="modal-task-delete-btn">Delete</button>
                <button class="submit-btn" id="modal-task-save-btn">Save</button>
            </div>
        </div>
    </div>

    <div id="top-controls">
        <div class="control-panel intake-panel">
            <form id="add-task-form" class="input-form">
                <input type="text" id="new-task-input" class="text-input" placeholder="New task..." autocomplete="off" required>
                <button type="submit" class="submit-btn">Add Task</button>
            </form>
            <div class="task-list drop-zone" id="intake"></div>
        </div>

        <div class="control-panel category-panel">
            <form id="add-category-form" class="input-form">
                <input type="text" id="new-category-name" class="text-input" placeholder="Add category..." autocomplete="off" required>
                <button type="submit" class="submit-btn">Add</button>
            </form>
            <button id="export-btn" class="submit-btn">Export to TXT</button>
        </div>
    </div>

    <div id="main-board">
        <div class="category-box">
            <div class="category-sidebar" style="cursor: default;" title="Permanent Category">
                <h2 class="sidebar-title">Repeatable</h2>
            </div>
            <div class="task-list drop-zone" id="repeatable_tasks"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, writeBatch, query, where, getDocs } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxKv-xXahSO2TEtwVwXTfU1eJ1ZsaaMAc",
            authDomain: "tasks-de4d9.firebaseapp.com",
            databaseURL: "https://tasks-de4d9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tasks-de4d9",
            storageBucket: "tasks-de4d9.firebasestorage.app",
            messagingSenderId: "908733856196",
            appId: "1:908733856196:web:b8d268a692a0e079be4c91"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const tasksRef = collection(db, "command_board_tasks");
        const categoriesRef = collection(db, "command_board_categories"); 

        let currentTasks = {};
        let currentCategories = {};
        let currentDragSourceCategory = ''; 
        
        // State variables for modals
        let currentEditingCatId = null; 
        let currentEditingTaskId = null;

        function renderBoard() {
            const mainBoard = document.getElementById('main-board');
            const intakeZone = document.getElementById('intake');
            
            const dynamicContainer = mainBoard.children[0]; 
            if (mainBoard.contains(dynamicContainer) && mainBoard.children.length > 1) {
                 mainBoard.removeChild(dynamicContainer); 
            }
            
            const dynamicArea = document.createElement('div');
            dynamicArea.style.display = 'contents'; 
            mainBoard.insertBefore(dynamicArea, mainBoard.lastElementChild);
            
            intakeZone.innerHTML = '';
            document.querySelectorAll('.task-list').forEach(list => list.innerHTML = '');

            const sortedCategories = Object.entries(currentCategories).sort((a, b) => {
                return a[1].name.localeCompare(b[1].name);
            });

            sortedCategories.forEach(([catId, cat]) => {
                const catBox = document.createElement('div');
                catBox.className = 'category-box';
                catBox.innerHTML = `
                    <div class="category-sidebar" onclick="openCategoryModal('${catId}', '${cat.name.replace(/'/g, "\\'")}')" title="Edit Category">
                        <h2 class="sidebar-title">${cat.name}</h2>
                    </div>
                    <div class="task-list drop-zone" id="${catId}"></div>
                `;
                dynamicArea.appendChild(catBox);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                    zone.parentElement.classList.add('drag-over');
                    const glowColor = zone.id === 'repeatable_tasks' ? '#d84315' : 'var(--accent)';
                    zone.parentElement.style.boxShadow = `0 0 0 2px ${glowColor}, var(--shadow)`;
                });
                zone.addEventListener('dragleave', () => {
                    zone.parentElement.classList.remove('drag-over');
                    zone.parentElement.style.boxShadow = 'var(--shadow)';
                });
                zone.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    zone.parentElement.classList.remove('drag-over');
                    zone.parentElement.style.boxShadow = 'var(--shadow)';
                    
                    const taskId = e.dataTransfer.getData('text/plain');
                    const targetCategory = zone.id;
                    const draggedTask = currentTasks[taskId];

                    if (!draggedTask) return;

                    if (currentDragSourceCategory === 'repeatable_tasks' && targetCategory !== 'repeatable_tasks') {
                         try { 
                            await addDoc(tasksRef, { text: draggedTask.text, category: targetCategory, createdAt: serverTimestamp() });
                         } catch (error) { alert("FIREBASE ERROR: " + error.message); }
                    } 
                    else {
                        if (draggedTask.category !== targetCategory) {
                             try { await updateDoc(doc(db, "command_board_tasks", taskId), { category: targetCategory }); } 
                             catch (error) { alert("FIREBASE ERROR: " + error.message); }
                        }
                    }
                });
            });

            Object.entries(currentTasks).forEach(([taskId, task]) => {
                const card = document.createElement('div');
                card.className = 'task-card';
                card.draggable = true;
                card.id = taskId;
                card.title = "Click to edit, drag to move";
                
                // Utterly stripped down internal HTML
                card.innerHTML = `<span>${task.text}</span>`;
                
                // Add click listener for the new modal
                card.addEventListener('click', () => {
                    openTaskModal(taskId, task.text);
                });

                card.addEventListener('dragstart', (e) => {
                    currentDragSourceCategory = task.category; 
                    e.dataTransfer.setData('text/plain', taskId);
                    setTimeout(() => card.style.opacity = '0.5', 0);
                });
                card.addEventListener('dragend', () => card.style.opacity = '1');

                let dropZone = document.getElementById(task.category);
                if (!dropZone) dropZone = intakeZone;
                
                dropZone.appendChild(card);
            });
        }

        onSnapshot(categoriesRef, (snapshot) => {
            currentCategories = {};
            snapshot.forEach(doc => { currentCategories[doc.id] = doc.data(); });
            renderBoard();
        }, (error) => console.error("Category Error: ", error));

        onSnapshot(tasksRef, (snapshot) => {
            currentTasks = {};
            snapshot.forEach(doc => { currentTasks[doc.id] = doc.data(); });
            renderBoard();
        }, (error) => console.error("Task Error: ", error));

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('new-task-input');
            if (input.value.trim() === '') return;
            const taskText = input.value;
            input.value = '';
            input.focus();
            try { await addDoc(tasksRef, { text: taskText, category: 'intake', createdAt: serverTimestamp() }); } 
            catch (error) { alert("FIREBASE ERROR: " + error.message); }
        });

        document.getElementById('add-category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('new-category-name');
            if (nameInput.value.trim() === '') return;
            
            try {
                await addDoc(categoriesRef, { 
                    name: nameInput.value.trim(), 
                    createdAt: serverTimestamp() 
                });
                nameInput.value = '';
            } catch (error) { alert("FIREBASE ERROR: " + error.message); }
        });

        // --- Category Modal Logic ---
        window.openCategoryModal = (catId, currentName) => {
            currentEditingCatId = catId;
            document.getElementById('modal-cat-name').value = currentName;
            document.getElementById('category-modal').style.display = 'flex';
            document.getElementById('modal-cat-name').focus();
        };

        window.closeCategoryModal = () => {
            document.getElementById('category-modal').style.display = 'none';
            currentEditingCatId = null;
        };

        document.getElementById('modal-save-btn').addEventListener('click', async () => {
            if (!currentEditingCatId) return;
            const newName = document.getElementById('modal-cat-name').value.trim();
            if (newName !== "") {
                try {
                    await updateDoc(doc(db, "command_board_categories", currentEditingCatId), { name: newName });
                    closeCategoryModal();
                } catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        });

        document.getElementById('modal-delete-btn').addEventListener('click', async () => {
            if (!currentEditingCatId) return;
            if (confirm("Delete this category? All tasks inside will be moved to the Intake bench.")) {
                try {
                    const q = query(tasksRef, where("category", "==", currentEditingCatId));
                    const snapshot = await getDocs(q);
                    
                    const batch = writeBatch(db);
                    snapshot.forEach((taskDoc) => {
                        batch.update(taskDoc.ref, { category: 'intake' });
                    });
                    await batch.commit();
                    await deleteDoc(doc(db, "command_board_categories", currentEditingCatId));
                    closeCategoryModal();
                } catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        });

        // --- NEW: Task Modal Logic ---
        window.openTaskModal = (taskId, text) => {
            currentEditingTaskId = taskId;
            document.getElementById('modal-task-text').value = text;
            document.getElementById('task-modal').style.display = 'flex';
            document.getElementById('modal-task-text').focus();
        };

        window.closeTaskModal = () => {
            document.getElementById('task-modal').style.display = 'none';
            currentEditingTaskId = null;
        };

        document.getElementById('modal-task-save-btn').addEventListener('click', async () => {
            if (!currentEditingTaskId) return;
            const newText = document.getElementById('modal-task-text').value.trim();
            if (newText !== "") {
                try {
                    await updateDoc(doc(db, "command_board_tasks", currentEditingTaskId), { text: newText });
                    closeTaskModal();
                } catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        });

        document.getElementById('modal-task-delete-btn').addEventListener('click', async () => {
            if (!currentEditingTaskId) return;
            // Immediate deletion without confirm box since they already hit the scary red button
            try {
                await deleteDoc(doc(db, "command_board_tasks", currentEditingTaskId));
                closeTaskModal();
            } catch (error) { alert("FIREBASE ERROR: " + error.message); }
        });

        // --- Export Logic ---
        document.getElementById('export-btn').addEventListener('click', () => {
            let exportData = "";

            exportData += "=== INTAKE BENCH ===\n";
            const intakeTasks = Object.values(currentTasks).filter(t => t.category === 'intake' || (!currentCategories[t.category] && t.category !== 'repeatable_tasks'));
            if (intakeTasks.length === 0) exportData += "(Empty)\n";
            intakeTasks.forEach(t => exportData += `- ${t.text}\n`);
            exportData += "\n";

            const sortedCategories = Object.entries(currentCategories).sort((a, b) => {
                return a[1].name.localeCompare(b[1].name);
            });

            sortedCategories.forEach(([catId, cat]) => {
                exportData += `=== ${cat.name.toUpperCase()} ===\n`;
                const catTasks = Object.values(currentTasks).filter(t => t.category === catId);
                
                if (catTasks.length === 0) {
                    exportData += "(Empty)\n";
                } else {
                    catTasks.forEach(t => exportData += `- ${t.text}\n`);
                }
                exportData += "\n";
            });

            exportData += "=== 📅 REPEATABLE TASKS BENCH ===\n";
            const repeatableTasks = Object.values(currentTasks).filter(t => t.category === 'repeatable_tasks');
             if (repeatableTasks.length === 0) exportData += "(Empty)\n";
            repeatableTasks.forEach(t => exportData += `- ${t.text}\n`);
            exportData += "\n";

            const blob = new Blob([exportData], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            
            const dateStr = new Date().toISOString().split('T')[0];
            a.download = `CommandBoard_Tasks_${dateStr}.txt`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
