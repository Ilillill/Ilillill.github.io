<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Flashcards</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-dark: #3c3c3c;
            --color-green: #A1DD70;
            --color-red: #A23131;
            --sidebar-width: 100px;
        }

        body {
            margin: 0;
            font-family: 'Calibri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        /* --- Layout --- */
        #sidebar {
            width: var(--sidebar-width);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 15px;
            border-right: 1px solid #eee;
            background: #fff;
            z-index: 10;
        }

        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- Top Bar (Stats) --- */
        #top-bar {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            font-size: 1.2rem;
        }

        /* --- Flashcard Area --- */
        #card-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #hint-display { font-size: 1.5rem; min-height: 2rem; margin-bottom: 20px; color: #666; }
        #question-display { font-size: 4rem; font-weight: bold; margin-bottom: 20px; white-space: pre-wrap;}
        #note-display { font-size: 1rem; color: #666; min-height: 1.5rem; margin-bottom: 40px;}
        
        #answer-input {
            width: 60%;
            font-size: 2rem;
            padding: 10px;
            text-align: center;
            border: none;
            border-bottom: 2px solid #ccc;
            outline: none;
            background: transparent;
            color: var(--color-green);
        }

        #bottom-left-feedback {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 1.2rem;
        }

        /* --- Buttons & Inputs --- */
        .btn {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            width: 80%;
            transition: all 0.2s;
        }
        .btn:hover { background: #f0f0f0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .control-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        /* --- Screens --- */
        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        #start-screen, #final-screen {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #target-banner {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 40px;
            padding: 15px 30px;
            border-radius: 10px;
            background-color: #f9f9f9;
            border: 2px dashed #ccc;
        }

        /* --- Modals --- */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #fff; padding: 30px; border-radius: 10px;
            width: 60%; max-height: 80%; overflow-y: auto;
            position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.5rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
        th { font-weight: bold; }

        /* Full page colors for feedback */
        .bg-green { background-color: var(--color-green) !important; color: #fff !important; }
        .bg-red { background-color: var(--color-red) !important; color: #fff !important; }
        .bg-green input, .bg-red input { color: #fff !important; border-bottom-color: #fff !important;}
        .bg-green #sidebar, .bg-red #sidebar { background-color: transparent; border-right-color: transparent;}
        .bg-green .btn, .bg-red .btn { display: none; } /* Hide buttons during feedback */
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <div id="target-banner">
            Today's Target Deck: <span id="current-target" style="color: var(--color-green);">1</span>
        </div>

        <div class="control-group">
            <select id="target-selector-start" class="btn" style="width: 250px; padding: 10px;" onchange="setTargetDeck(this.value)">
                <option value="">-- Update Target Deck --</option>
                <option value="1">Set Target to 1</option>
                <option value="2">Set Target to 2</option>
                <option value="3">Set Target to 3</option>
                <option value="4">Set Target to 4</option>
                <option value="5">Set Target to 5</option>
                <option value="6">Set Target to 6</option>
                <option value="7">Set Target to 7</option>
                <option value="8">Set Target to 8</option>
                <option value="9">Set Target to 9</option>
                <option value="10">Set Target to 10</option>
            </select>
        </div>

        <div class="control-group" style="margin-top: 30px;">
            <select id="deck-selector" class="btn" style="width: 300px; padding: 15px; font-size: 1.1rem; border-color: var(--color-green); border-width: 2px;">
                <option value="">-- Load a GitHub Deck --</option>
                <option value="1">Load Deck 1</option>
                <option value="2">Load Deck 2</option>
                <option value="3">Load Deck 3</option>
                <option value="4">Load Deck 4</option>
                <option value="5">Load Deck 5</option>
                <option value="6">Load Deck 6</option>
                <option value="7">Load Deck 7</option>
                <option value="8">Load Deck 8</option>
                <option value="9">Load Deck 9</option>
                <option value="10">Load Deck 10</option>
            </select>
        </div>

        <p style="margin: 20px 0; color: #888;">— OR —</p>

        <div class="control-group">
            <input type="file" id="file-upload" accept=".csv" style="display: none;">
            <button class="btn" style="width: 200px; padding: 15px; font-size: 1.1rem;" onclick="document.getElementById('file-upload').click()">Upload Local CSV</button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="screen">
        <div id="sidebar">
            <button class="btn" onclick="openNew()">New</button>
            <button class="btn" onclick="showPreview()">Preview</button>
            <button class="btn" onclick="passCard()">Pass</button>
            <button class="btn" id="hint-btn" onclick="giveHint()">Hint</button>
            <button class="btn" id="reveal-btn" onmousedown="showReveal()" onmouseup="hideReveal()" onmouseleave="hideReveal()">Reveal</button>
        </div>

        <div id="main-content">
            <div id="top-bar">
                <span id="initial-count">Flashcards: 0</span>
                <span id="left-count">Left: 0</span>
            </div>

            <div id="card-area">
                <div id="hint-display"></div>
                <div id="question-display">Question</div>
                <div id="note-display"></div>
                <input type="text" id="answer-input" autocomplete="off" spellcheck="false">
            </div>

            <div id="bottom-left-feedback"></div>
        </div>
    </div>

    <!-- FINAL SCREEN -->
    <div id="final-screen" class="screen">
        <h1 style="font-size: 4rem; color: var(--color-green);">Well done!</h1>
        
        <div id="mistakes-section" style="display: none; text-align: center; margin-top: 20px;">
            <h2 style="color: var(--text-dark);">Errors: <span id="error-count">0</span></h2>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                <button class="btn" onclick="exportWrong()">Export Errors (CSV)</button>
                <button class="btn" onclick="copyWrong()">Copy to Clipboard</button>
                <button class="btn" onclick="repeatDifficult()">Repeat Difficult</button>
            </div>
            <br>
            <button class="btn" onclick="tryAgain()" style="width: auto;">Try Full Deck Again</button>
        </div>

        <div id="perfect-section" style="display: none; margin-top: 20px; text-align: center;">
            <div style="margin-bottom: 30px;">
                <p style="font-size: 1.2rem;">Ready for the next deck tomorrow?</p>
                <select id="target-selector-final" class="btn" style="width: 250px; padding: 10px;" onchange="setTargetDeck(this.value)">
                    <option value="">-- Update Target Deck --</option>
                    <option value="1">Set Target to 1</option>
                    <option value="2">Set Target to 2</option>
                    <option value="3">Set Target to 3</option>
                    <option value="4">Set Target to 4</option>
                    <option value="5">Set Target to 5</option>
                    <option value="6">Set Target to 6</option>
                    <option value="7">Set Target to 7</option>
                    <option value="8">Set Target to 8</option>
                    <option value="9">Set Target to 9</option>
                    <option value="10">Set Target to 10</option>
                </select>
            </div>
            <button class="btn" onclick="tryAgain()" style="width: auto;">Practice This Again</button>
            <button class="btn" onclick="openNew()" style="width: auto; margin-left: 10px;">Load New</button>
        </div>
    </div>

    <!-- PREVIEW MODAL -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('preview-modal')">&times;</span>
            <h2>Deck Preview</h2>
            <table>
                <thead><tr><th>Question</th><th>Answer(s)</th></tr></thead>
                <tbody id="preview-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- State Variables ---
        let initialDeck = [];
        let deck = [];
        let wrongDeck = [];
        let currentCard = null;
        let isAnswerState = false; 
        let currentFileName = "vocabulary";

        // --- DOM Elements ---
        const inputField = document.getElementById('answer-input');
        const fileUpload = document.getElementById('file-upload');
        const questionDisplay = document.getElementById('question-display');
        const noteDisplay = document.getElementById('note-display');
        const hintDisplay = document.getElementById('hint-display');
        const countDisplay = document.getElementById('initial-count');
        const leftDisplay = document.getElementById('left-count');
        const bottomLeftFeedback = document.getElementById('bottom-left-feedback');
        const deckSelector = document.getElementById('deck-selector');
        
        // --- Initialization ---
        window.onload = () => {
            // Check browser storage for the target deck, default to 1
            const savedTarget = localStorage.getItem('targetDeck') || '1';
            document.getElementById('current-target').innerText = savedTarget;
        };

        // --- Memory / Target Setting ---
        function setTargetDeck(val) {
            if (!val) return;
            localStorage.setItem('targetDeck', val);
            document.getElementById('current-target').innerText = val;
            
            // Reset the dropdowns so they don't get stuck on a value
            document.getElementById('target-selector-start').value = "";
            document.getElementById('target-selector-final').value = "";
        }

        // --- GitHub Pre-loaded Deck Handling ---
        deckSelector.addEventListener('change', function(e) {
            const val = e.target.value;
            if (!val) return;

            const fileName = `${val}.csv`;
            currentFileName = `deck_${val}`;
            
            fetch(fileName)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Network response was not ok. File might be missing.");
                    }
                    return response.text();
                })
                .then(text => {
                    parseCSV(text);
                    deckSelector.value = ""; 
                })
                .catch(error => {
                    alert(`Could not load ${fileName}. Make sure the file is uploaded to the same GitHub folder as your index.html file!`);
                    console.error("Fetch error:", error);
                    deckSelector.value = "";
                });
        });

        // --- File Handling (Manual Backup) ---
        fileUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            currentFileName = file.name.replace('.csv', '');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                parseCSV(event.target.result);
            };
            reader.readAsText(file);
            fileUpload.value = ''; // Reset input
        });

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            initialDeck = [];
            
            for(let i = 1; i < lines.length; i++) {
                if(lines[i].trim() === '') continue;
                const parts = lines[i].split(',');
                if(parts.length >= 5) {
                    initialDeck.push({
                        q: parts[0].trim(),
                        a1: parts[1].trim(),
                        a2: parts[2].trim(),
                        qNote: parts[3].trim(),
                        aNote: parts[4].trim()
                    });
                }
            }

            if(initialDeck.length > 0) {
                startSession([...initialDeck]);
            } else {
                alert("Could not load flashcards. Ensure your CSV has exactly 5 columns separated by commas.");
            }
        }

        // --- Core Flow ---
        function startSession(cards) {
            deck = cards;
            wrongDeck = [];
            switchScreen('app-screen');
            countDisplay.innerText = `Flashcards: ${deck.length}`;
            drawCard();
        }

        function drawCard() {
            if(deck.length === 0) {
                showFinalScreen();
                return;
            }
            
            isAnswerState = false;
            document.body.className = ''; // Reset background
            inputField.disabled = false;
            inputField.value = '';
            inputField.style.color = 'var(--color-green)';
            bottomLeftFeedback.innerText = '';
            document.getElementById('hint-btn').disabled = false;
            
            leftDisplay.innerText = `Left: ${deck.length}`;
            
            // Randomly select card
            const randomIndex = Math.floor(Math.random() * deck.length);
            currentCard = deck[randomIndex];
            
            questionDisplay.innerText = currentCard.q;
            noteDisplay.innerText = currentCard.qNote || '';
            hintDisplay.innerText = '';
            
            inputField.focus();
        }

        // --- Live Validation & Enter Key ---
        inputField.addEventListener('input', () => {
            if(isAnswerState) return;
            const userInput = inputField.value.toLowerCase();
            const correct1 = currentCard.a1.toLowerCase();
            const correct2 = currentCard.a2.toLowerCase();
            
            if (correct1.startsWith(userInput) || (correct2 && correct2.startsWith(userInput))) {
                inputField.style.color = 'var(--color-green)';
            } else {
                inputField.style.color = 'var(--color-red)';
            }
        });

        // Use global document listener so Enter works even when input is disabled
        document.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') {
                if (document.getElementById('app-screen').classList.contains('active')) {
                    if(!isAnswerState) {
                        processAnswer();
                    } else {
                        if(document.body.classList.contains('bg-green')){
                            deck = deck.filter(c => c !== currentCard);
                        }
                        drawCard();
                    }
                }
            }
        });

        function processAnswer() {
            isAnswerState = true;
            inputField.disabled = true;
            const userInput = inputField.value.trim().toLowerCase();
            const correct1 = currentCard.a1.toLowerCase();
            const correct2 = currentCard.a2.toLowerCase();

            if(userInput === correct1 || (currentCard.a2 && userInput === correct2)) {
                // Correct
                document.body.className = 'bg-green';
                questionDisplay.innerText = currentCard.a1 + (currentCard.a2 ? `\n${currentCard.a2}` : '');
                noteDisplay.innerText = currentCard.aNote || '';
                inputField.value = ''; 
            } else {
                // Wrong
                document.body.className = 'bg-red';
                const translationText = currentCard.a1 + (currentCard.a2 ? ` / ${currentCard.a2}` : '');
                questionDisplay.innerText = translationText;
                noteDisplay.innerText = currentCard.aNote || '';
                
                const feedbackText = userInput ? `Your answer was: ${inputField.value}` : "You didn't provide an answer.";
                bottomLeftFeedback.innerText = `${currentCard.q} translates to ${translationText}. ${feedbackText}`;
                
                wrongDeck.push({ ...currentCard, userAnswer: inputField.value });
            }
        }

        // --- Sidebar Functions ---
        function passCard() {
            if(isAnswerState) return;
            drawCard(); 
        }

        function giveHint() {
            if(!currentCard || isAnswerState) return;
            inputField.value = currentCard.a1.charAt(0);
            inputField.dispatchEvent(new Event('input')); 
            document.getElementById('hint-btn').disabled = true;
            inputField.focus();
        }

        function showReveal() {
            if(!currentCard || isAnswerState) return;
            hintDisplay.innerText = currentCard.a1;
        }

        function hideReveal() {
            hintDisplay.innerText = '';
            inputField.focus();
        }

        function openNew() {
            if(confirm("Are you sure you want to discard current progress and open a new set?")) {
                switchScreen('start-screen');
            }
        }

        // --- End of Deck Functions ---
        function showFinalScreen() {
            switchScreen('final-screen');
            document.body.className = '';
            
            const mistSect = document.getElementById('mistakes-section');
            const perfSect = document.getElementById('perfect-section');
            
            if(wrongDeck.length > 0) {
                mistSect.style.display = 'block';
                perfSect.style.display = 'none';
                document.getElementById('error-count').innerText = wrongDeck.length;
            } else {
                mistSect.style.display = 'none';
                perfSect.style.display = 'block';
            }
        }

        function tryAgain() {
            startSession([...initialDeck]);
        }

        function repeatDifficult() {
            const uniqueWrong = [];
            const seen = new Set();
            for(const item of wrongDeck) {
                if(!seen.has(item.q)) {
                    seen.add(item.q);
                    uniqueWrong.push({q: item.q, a1: item.a1, a2: item.a2, qNote: item.qNote, aNote: item.aNote});
                }
            }
            startSession(uniqueWrong);
        }

        // --- Export & Copy Data ---
        function exportWrong() {
            let csvContent = "Question,Answer1,Answer2,Question Note,Answer Note\n";
            
            const uniqueSet = new Map();
            wrongDeck.forEach(item => {
                uniqueSet.set(item.q, item);
            });

            uniqueSet.forEach(item => {
                csvContent += `${item.q},${item.a1},${item.a2},${item.qNote},${item.aNote}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            const date = new Date();
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}-${String(date.getMinutes()).padStart(2,'0')}`;
            
            link.setAttribute("href", url);
            link.setAttribute("download", `${currentFileName} DIFFICULT ONLY ${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function copyWrong() {
            let copyString = "Question | Answer | Note\n\n";
            wrongDeck.forEach(item => {
                const a2Str = item.a2 ? `/${item.a2}` : '';
                copyString += `${item.q} - ${item.a1}${a2Str}\n`;
            });
            navigator.clipboard.writeText(copyString).then(() => {
                alert("Incorrect answers copied to clipboard.");
            });
        }

        // --- Modals & Utils ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showPreview() {
            const tbody = document.getElementById('preview-table-body');
            tbody.innerHTML = '';
            
            (deck.length > 0 ? deck : initialDeck).forEach(item => {
                const row = document.createElement('tr');
                const a2Str = item.a2 ? ` / ${item.a2}` : '';
                row.innerHTML = `<td>${item.q}</td><td>${item.a1}${a2Str}</td>`;
                tbody.appendChild(row);
            });
            
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
            if(!isAnswerState) inputField.focus();
        }

        window.onclick = function(event) {
            const modal = document.getElementById('preview-modal');
            if (event.target == modal) {
                closeModal('preview-modal');
            }
        }
    </script>
</body>
</html>
