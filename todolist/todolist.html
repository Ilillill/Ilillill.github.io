<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Board</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --accent: #ff9800; 
            --hover-bg: #2a2a2a;
            --drop-zone-bg: #181818; 
        }

        /* 1. Slimmed Down Body Padding */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px; /* Reduced from 20px */
            display: flex;
            flex-direction: column; 
            height: 100vh;
            box-sizing: border-box;
            gap: 12px; /* Tighter gap between top bar and grid */
        }

        /* 2. Ultra-Minimal Intake Bar (Header Removed) */
        #intake-column {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; /* Slimmer padding */
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #add-task-form { display: flex; gap: 8px; margin-bottom: 6px; }
        
        #new-task-input {
            flex: 1;
            padding: 8px 10px; /* Thinner textbox */
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #2d2d2d;
            color: var(--text);
            font-size: 0.9rem;
        }
        
        button.submit-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 8px 16px; /* Smaller button */
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.submit-btn:hover { background: #e68a00; }

        /* 3. Grid Locked to Max 4 Columns */
        #main-board {
            flex: 1;
            display: grid;
            /* Magic Math: Forces exactly 4 columns max, scales down smoothly on mobile */
            grid-template-columns: repeat(auto-fit, minmax(max(280px, calc(25% - 15px)), 1fr));
            align-items: start; 
            align-content: start; 
            gap: 12px; /* Tighter gaps between boxes */
            overflow-y: auto;
            padding-right: 5px; 
        }

        /* 4. Condensed Category Boxes & Titles */
        .category-box {
            background: var(--surface);
            border-radius: 6px;
            padding: 10px; /* Reduced internal padding */
            border: 1px dashed #444; /* Thinner borders */
            min-height: 80px; /* Squatter empty boxes */
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }

        .category-box.drag-over {
            border-color: var(--accent);
            background: var(--hover-bg);
        }

        h2 { 
            font-size: 0.95rem; /* Smaller titles */
            margin-top: 0; 
            margin-bottom: 8px; /* Tucked much closer to the tasks */
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        /* 5. High-Density Task Drop Zones */
        .task-list {
            flex: 1;
            min-height: 40px; /* Smaller empty drop zones */
            display: flex;
            flex-direction: row; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 6px; /* Tighter gap between tasks */
            padding: 6px; /* Less empty space around tasks */
            background: var(--drop-zone-bg); 
            border-radius: 4px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); 
        }

        /* 6. Slimmer Task Cards & Buttons */
        .task-card {
            background: #2d2d2d;
            border-left: 3px solid var(--accent); /* Thinner accent line */
            padding: 4px 8px; /* Very tight padding */
            border-radius: 4px;
            cursor: grab;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
            user-select: none;
            display: inline-flex; 
            align-items: center;
            width: fit-content; 
            max-width: 100%; 
            box-sizing: border-box;
            gap: 6px; /* Tighter spacing inside the card */
        }

        .task-card span {
            word-break: break-word; 
            font-size: 0.85rem; /* Smaller task text */
        }

        .task-card:active { cursor: grabbing; opacity: 0.8; transform: scale(0.98); }
        
        .action-btns {
            display: flex;
            gap: 6px;
            margin-left: auto; 
        }

        .task-card .action-btns button {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            font-size: 0.85rem; /* Smaller edit/delete icons */
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        
        .task-card .action-btns button:hover { opacity: 1; }
        .task-card .edit-btn { color: #4dd0e1; }
        .task-card .delete-btn { color: #ff5252; }
    </style>
</head>
<body>

    <div id="intake-column">
        <form id="add-task-form">
            <input type="text" id="new-task-input" placeholder="Drop a thought here..." autocomplete="off" required>
            <button type="submit" class="submit-btn">Add</button>
        </form>
        <div class="task-list drop-zone" id="intake"></div>
    </div>

    <div id="main-board">
        <div class="category-box"><h2 style="color: #ffb74d;">🧙‍♂️ Krzysio</h2><div class="task-list drop-zone" id="krzysio"></div></div>
        <div class="category-box"><h2 style="color: #f06292;">🌷 Renatka</h2><div class="task-list drop-zone" id="renatka"></div></div>
        <div class="category-box"><h2 style="color: #81c784;">🦖 Oliver</h2><div class="task-list drop-zone" id="oliver"></div></div>
        <div class="category-box"><h2 style="color: #aed581;">🏕️ Adventures</h2><div class="task-list drop-zone" id="adventures"></div></div>
        <div class="category-box"><h2 style="color: #4dd0e1;">🦉 Education</h2><div class="task-list drop-zone" id="education"></div></div>
        <div class="category-box"><h2 style="color: #81c784;">🌳 Garden</h2><div class="task-list drop-zone" id="garden"></div></div>
        <div class="category-box"><h2 style="color: #64b5f6;">🏡 Home</h2><div class="task-list drop-zone" id="home"></div></div>
        <div class="category-box"><h2 style="color: #ff8a65;">🦎 Pets</h2><div class="task-list drop-zone" id="pets"></div></div>
        <div class="category-box"><h2 style="color: #ba68c8;">🏔️ Projects</h2><div class="task-list drop-zone" id="projects"></div></div>
        <div class="category-box"><h2 style="color: #e57373;">🛒 Shopping</h2><div class="task-list drop-zone" id="shopping"></div></div>
        <div class="category-box"><h2 style="color: #90a4ae;">🐜 Work</h2><div class="task-list drop-zone" id="work"></div></div>
        <div class="category-box"><h2 style="color: #dce775;">📅 Long Term</h2><div class="task-list drop-zone" id="longterm"></div></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxKv-xXahSO2TEtwVwXTfU1eJ1ZsaaMAc",
            authDomain: "tasks-de4d9.firebaseapp.com",
            databaseURL: "https://tasks-de4d9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tasks-de4d9",
            storageBucket: "tasks-de4d9.firebasestorage.app",
            messagingSenderId: "908733856196",
            appId: "1:908733856196:web:b8d268a692a0e079be4c91"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksRef = collection(db, "command_board_tasks");

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('new-task-input');
            if (input.value.trim() === '') return;
            const taskText = input.value;
            input.value = '';
            input.focus();
            try {
                await addDoc(tasksRef, { text: taskText, category: 'intake', createdAt: serverTimestamp() });
            } catch (error) { alert("FIREBASE ERROR: " + error.message); }
        });

        onSnapshot(tasksRef, (snapshot) => {
            document.querySelectorAll('.task-list').forEach(list => list.innerHTML = '');
            snapshot.forEach((docSnap) => {
                const task = docSnap.data();
                const taskId = docSnap.id;
                const card = document.createElement('div');
                card.className = 'task-card';
                card.draggable = true;
                card.id = taskId;
                card.innerHTML = `
                    <span>${task.text}</span>
                    <div class="action-btns">
                        <button class="edit-btn" onclick="editTask('${taskId}', '${task.text.replace(/'/g, "\\'")}')">✎</button>
                        <button class="delete-btn" onclick="deleteTask('${taskId}')">×</button>
                    </div>
                `;
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', taskId);
                    setTimeout(() => card.style.opacity = '0.5', 0);
                });
                card.addEventListener('dragend', () => card.style.opacity = '1');
                const dropZone = document.getElementById(task.category);
                if (dropZone) dropZone.appendChild(card);
            });
        }, (error) => alert("LISTENER ERROR: " + error.message));

        window.editTask = async (taskId, currentText) => {
            const newText = prompt("Edit your task:", currentText);
            if (newText !== null && newText.trim() !== "") {
                try { await updateDoc(doc(db, "command_board_tasks", taskId), { text: newText.trim() }); } 
                catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        };

        window.deleteTask = async (taskId) => {
            const userConfirmed = confirm("Are you sure you want to delete this task?");
            if (userConfirmed) {
                try { await deleteDoc(doc(db, "command_board_tasks", taskId)); } 
                catch (error) { alert("FIREBASE ERROR: " + error.message); }
            }
        };

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); 
                zone.parentElement.classList.add('drag-over');
            });
            zone.addEventListener('dragleave', () => zone.parentElement.classList.remove('drag-over'));
            zone.addEventListener('drop', async (e) => {
                e.preventDefault();
                zone.parentElement.classList.remove('drag-over');
                const taskId = e.dataTransfer.getData('text/plain');
                const newCategory = zone.id;
                try { await updateDoc(doc(db, "command_board_tasks", taskId), { category: newCategory }); } 
                catch (error) { alert("FIREBASE ERROR: " + error.message); }
            });
        });
    </script>
</body>
</html>
