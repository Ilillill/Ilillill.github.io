<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Speedy Shopper Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --surface: #1e1e1e;
            --border: #333;
            --text: #e0e0e0;
            --accent: #ff9800; 
            --btn-active: #e68a00;
            --danger: #ff5252;
        }

        /* 1. Ultra-Condensed Body */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            gap: 12px;
        }

        h2 { margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* 2. Top Navigation & Input */
        #top-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #custom-entry-form {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        #custom-input, .manage-input, .manage-select {
            flex: 1;
            padding: 8px 10px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: #2d2d2d;
            color: var(--text);
            font-size: 0.9rem;
        }

        button {
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .submit-btn {
            background: var(--accent);
            color: #000;
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        .submit-btn:hover { background: var(--btn-active); }

        .manage-toggle-btn {
            background: #333;
            color: #fff;
            padding: 8px 16px;
            font-size: 0.9rem;
            border: 1px solid #555;
            white-space: nowrap;
        }
        .manage-toggle-btn:hover { background: #444; }

        /* 3. High-Density Boards */
        .board {
            flex: 1;
            display: flex;
            flex-direction: column; 
            gap: 10px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* 4. Shop View Styles */
        .category-box {
            background: var(--surface);
            border-radius: 6px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.2s ease;
        }

        /* Drag Over Highlight */
        .category-box.drag-over {
            border-color: var(--accent);
            background-color: #2a2a2a;
        }

        .category-box h2 {
            font-size: 0.8rem; 
            flex: 0 0 130px; 
            padding-top: 6px;
            color: var(--text);
            font-weight: 600;
        }

        .item-grid {
            flex: 1 1 200px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 32px; /* Gives empty categories a drop-target height */
        }

        .shop-btn {
            background: #2d2d2d;
            border: 1px solid #444;
            color: var(--text);
            padding: 5px 10px;
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            user-select: none;
            cursor: grab;
        }
        .shop-btn:active { cursor: grabbing; }

        .shop-btn:hover { background: #3d3d3d; border-color: #666; }
        
        .shop-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: bold;
        }

        /* 5. Manage View Styles */
        .manage-section {
            background: var(--surface);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .manage-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 4px;
        }

        .manage-row {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #252525;
            padding: 6px 8px;
            border-radius: 4px;
        }

        .icon-btn {
            background: none;
            color: var(--danger);
            font-size: 1.1rem;
            padding: 4px 8px;
        }
        .icon-btn:hover { transform: scale(1.1); }
        .icon-btn.add { color: #4caf50; }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div id="top-bar">
        <form id="custom-entry-form">
            <input type="text" id="custom-input" placeholder="Type new item..." autocomplete="off" required>
            <button type="submit" class="submit-btn">Add</button>
        </form>
        <button id="toggle-view-btn" class="manage-toggle-btn"><i class="fa-solid fa-gear"></i> Manage</button>
    </div>

    <!-- MAIN SHOPPING BOARD -->
    <div id="shop-board" class="board"></div>

    <!-- MANAGE BOARD -->
    <div id="manage-board" class="board hidden">
        
        <div class="manage-section">
            <div class="manage-section-header">
                <h2>Categories</h2>
                <div style="display:flex; gap:6px;">
                    <input type="text" id="new-cat-input" class="manage-input" placeholder="New category name..." style="padding:4px 8px; font-size:0.8rem;">
                    <button id="add-cat-btn" class="submit-btn" style="padding:4px 8px;">Add</button>
                </div>
            </div>
            <div id="manage-categories-list" style="display: flex; flex-direction: column; gap: 6px;"></div>
        </div>

        <div class="manage-section">
            <div class="manage-section-header">
                <h2>Items Database</h2>
            </div>
            <div id="manage-items-list" style="display: flex; flex-direction: column; gap: 6px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, setDoc, writeBatch, getDocs } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBxKv-xXahSO2TEtwVwXTfU1eJ1ZsaaMAc",
            authDomain: "tasks-de4d9.firebaseapp.com",
            databaseURL: "https://tasks-de4d9-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tasks-de4d9",
            storageBucket: "tasks-de4d9.firebasestorage.app",
            messagingSenderId: "908733856196",
            appId: "1:908733856196:web:b8d268a692a0e079be4c91"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const configRef = doc(db, "shopping_matrix_config", "categories");
        const inventoryRef = collection(db, "shopping_matrix_inventory");

        let state = {
            categories: [],
            items: [],
            isManageMode: false
        };

        // --- Helper: Sort Categories & Items ---
        function getSortedCategories() {
            let sortedCats = [...state.categories].sort((a, b) => a.localeCompare(b));
            
            // Pull "Uncategorized" to the very top if it exists
            const uncatIndex = sortedCats.indexOf("Uncategorized");
            if (uncatIndex > -1) {
                sortedCats.splice(uncatIndex, 1);
                sortedCats.unshift("Uncategorized");
            }
            return sortedCats;
        }

        function getSortedItems(itemsArray) {
            return [...itemsArray].sort((a, b) => a.name.localeCompare(b.name));
        }

        // --- 1. SEED DATA ---
        // Completely removed icons and fallbacks from the seed data
        const defaultCategories = ["🍏 Produce", "🥩 Meat & Fish", "🥛 Dairy & Chilled", "🍞 Bakery & Breakfast", "🍕 Meals & Pantry", "🥤 Drinks", "🍫 Sweets & Snacks", "🧼 Household & Pets", "Uncategorized"];
        
        const defaultItems = [
            { name: "Apples", cat: "🍏 Produce" },
            { name: "Bananas", cat: "🍏 Produce" },
            { name: "Lemons", cat: "🍏 Produce" },
            { name: "Cabbage", cat: "🍏 Produce" },
            { name: "Carrots", cat: "🍏 Produce" },
            { name: "Cauliflower", cat: "🍏 Produce" },
            { name: "Cucumbers", cat: "🍏 Produce" },
            { name: "Bell Peppers", cat: "🍏 Produce" },
            { name: "Garlic", cat: "🍏 Produce" },
            { name: "Mushrooms", cat: "🍏 Produce" },
            { name: "Nectarines", cat: "🍏 Produce" },
            { name: "Avocado", cat: "🍏 Produce" },
            { name: "Onions", cat: "🍏 Produce" },
            { name: "Oranges", cat: "🍏 Produce" },
            { name: "Pears", cat: "🍏 Produce" },
            { name: "Strawberries", cat: "🍏 Produce" },
            { name: "Tomatoes", cat: "🍏 Produce" },
            { name: "Potatoes", cat: "🍏 Produce" },

            { name: "Chicken breasts", cat: "🥩 Meat & Fish" },
            { name: "Minced Meat", cat: "🥩 Meat & Fish" },
            { name: "Ham", cat: "🥩 Meat & Fish" },
            { name: "Sausages", cat: "🥩 Meat & Fish" },
            { name: "Prawns", cat: "🥩 Meat & Fish" },
            { name: "Tuna", cat: "🥩 Meat & Fish" },
            { name: "Fish Fingers", cat: "🥩 Meat & Fish" },

            { name: "Butter", cat: "🥛 Dairy & Chilled" },
            { name: "Cheese", cat: "🥛 Dairy & Chilled" },
            { name: "Yogurt", cat: "🥛 Dairy & Chilled" },
            { name: "Milk", cat: "🥛 Dairy & Chilled" },
            { name: "Eggs", cat: "🥛 Dairy & Chilled" },

            { name: "Bread", cat: "🍞 Bakery & Breakfast" },
            { name: "Sweet buns", cat: "🍞 Bakery & Breakfast" },
            { name: "Cereal", cat: "🍞 Bakery & Breakfast" },
            { name: "Cornflakes", cat: "🍞 Bakery & Breakfast" },

            { name: "Pizza", cat: "🍕 Meals & Pantry" },
            { name: "Instant noodles", cat: "🍕 Meals & Pantry" },
            { name: "Spaghetti", cat: "🍕 Meals & Pantry" },
            { name: "White rice", cat: "🍕 Meals & Pantry" },
            { name: "Cooking oil", cat: "🍕 Meals & Pantry" },
            { name: "Olive Oil", cat: "🍕 Meals & Pantry" },
            { name: "Flour", cat: "🍕 Meals & Pantry" },
            { name: "Sugar", cat: "🍕 Meals & Pantry" },
            { name: "Salt", cat: "🍕 Meals & Pantry" },
            { name: "Black Pepper", cat: "🍕 Meals & Pantry" },
            { name: "Jam", cat: "🍕 Meals & Pantry" },
            { name: "Jelly", cat: "🍕 Meals & Pantry" },
            { name: "Ketchup", cat: "🍕 Meals & Pantry" },
            { name: "Mayonnaise", cat: "🍕 Meals & Pantry" },
            { name: "Mustard", cat: "🍕 Meals & Pantry" },

            { name: "Pepsi Max", cat: "🥤 Drinks" },
            { name: "Soft drinks", cat: "🥤 Drinks" },
            { name: "Apple juice", cat: "🥤 Drinks" },
            { name: "Orange juice", cat: "🥤 Drinks" },
            { name: "Energy drinks", cat: "🥤 Drinks" },
            { name: "Ice Tea", cat: "🥤 Drinks" },
            { name: "Coffee", cat: "🥤 Drinks" },
            { name: "Cold coffee", cat: "🥤 Drinks" },
            { name: "Bottled Water", cat: "🥤 Drinks" },
            { name: "Wine", cat: "🥤 Drinks" },
            { name: "Beer", cat: "🥤 Drinks" },

            { name: "Chocobonki", cat: "🍫 Sweets & Snacks" },
            { name: "Ptasie Mleczko", cat: "🍫 Sweets & Snacks" },
            { name: "Reese's", cat: "🍫 Sweets & Snacks" },
            { name: "Sweets", cat: "🍫 Sweets & Snacks" },
            { name: "Ice cream", cat: "🍫 Sweets & Snacks" },
            { name: "Ice Cubes", cat: "🍫 Sweets & Snacks" },
            { name: "Nuts", cat: "🍫 Sweets & Snacks" },
            { name: "Mixed nuts", cat: "🍫 Sweets & Snacks" },
            { name: "Popcorn", cat: "🍫 Sweets & Snacks" },
            { name: "Protein bars", cat: "🍫 Sweets & Snacks" },

            { name: "Dog food", cat: "🧼 Household & Pets" },
            { name: "Bird seed", cat: "🧼 Household & Pets" },
            { name: "Laundry detergent", cat: "🧼 Household & Pets" },
            { name: "Washing-up liquid", cat: "🧼 Household & Pets" },
            { name: "Soap", cat: "🧼 Household & Pets" },
            { name: "Cleaning wipes", cat: "🧼 Household & Pets" },
            { name: "Kitchen towel", cat: "🧼 Household & Pets" },
            { name: "Bin Bags", cat: "🧼 Household & Pets" },
            { name: "Sponges", cat: "🧼 Household & Pets" },
            { name: "Shampoo", cat: "🧼 Household & Pets" },
            { name: "Toothpaste", cat: "🧼 Household & Pets" },
            { name: "Toilet paper", cat: "🧼 Household & Pets" },
            { name: "Wet wipes", cat: "🧼 Household & Pets" }
        ];

        async function seedDatabase() {
            const invSnap = await getDocs(inventoryRef);
            if (invSnap.empty) {
                await setDoc(configRef, { list: defaultCategories });
                const batch = writeBatch(db);
                defaultItems.forEach(item => {
                    const newDocRef = doc(inventoryRef);
                    batch.set(newDocRef, {
                        name: item.name,
                        category: item.cat,
                        isActive: false
                    });
                });
                await batch.commit();
            }
        }
        seedDatabase();


        // --- 2. REAL-TIME LISTENERS ---
        onSnapshot(configRef, (docSnap) => {
            if (docSnap.exists()) {
                state.categories = docSnap.data().list || [];
            }
            renderApp();
        });

        onSnapshot(inventoryRef, (snapshot) => {
            state.items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderApp();
        });

        // --- 3. RENDER LOGIC ---
        function renderApp() {
            renderShopBoard();
            if(state.isManageMode) renderManageBoard();
        }

        function renderShopBoard() {
            const board = document.getElementById('shop-board');
            board.innerHTML = '';

            const displayCategories = getSortedCategories();

            displayCategories.forEach(catName => {
                let catItems = state.items.filter(i => i.category === catName);
                catItems = getSortedItems(catItems); 
                
                if (catName === "Uncategorized" && catItems.length === 0) return;

                const box = document.createElement('div');
                box.className = 'category-box';
                
                box.addEventListener('dragover', (e) => {
                    e.preventDefault(); 
                    box.classList.add('drag-over');
                });
                box.addEventListener('dragleave', () => {
                    box.classList.remove('drag-over');
                });
                box.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    box.classList.remove('drag-over');
                    const itemId = e.dataTransfer.getData('text/plain');
                    if (itemId) {
                        await updateDoc(doc(db, "shopping_matrix_inventory", itemId), { category: catName });
                    }
                });

                const title = document.createElement('h2');
                title.textContent = catName;
                box.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'item-grid';

                catItems.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = `shop-btn ${item.isActive ? 'active' : ''}`;
                    
                    // Directly injecting the product name without any icons
                    btn.textContent = item.name;
                    
                    btn.draggable = true;
                    btn.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', item.id);
                        e.dataTransfer.effectAllowed = "move";
                    });

                    btn.onclick = async () => {
                        await updateDoc(doc(db, "shopping_matrix_inventory", item.id), { isActive: !item.isActive });
                    };
                    grid.appendChild(btn);
                });

                box.appendChild(grid);
                board.appendChild(box);
            });
        }

        function renderManageBoard() {
            const catList = document.getElementById('manage-categories-list');
            const itemList = document.getElementById('manage-items-list');
            catList.innerHTML = '';
            itemList.innerHTML = '';

            const displayCategories = getSortedCategories();
            const displayItems = getSortedItems(state.items);

            displayCategories.forEach(cat => {
                const row = document.createElement('div');
                row.className = 'manage-row';
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'manage-input';
                input.value = cat;
                
                input.onblur = async () => {
                    const newName = input.value.trim();
                    if (newName && newName !== cat) {
                        const newCats = state.categories.map(c => c === cat ? newName : c);
                        await setDoc(configRef, { list: newCats });
                        
                        const batch = writeBatch(db);
                        state.items.filter(i => i.category === cat).forEach(item => {
                            batch.update(doc(db, "shopping_matrix_inventory", item.id), { category: newName });
                        });
                        await batch.commit();
                    }
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'icon-btn';
                delBtn.innerHTML = '×';
                delBtn.onclick = async () => {
                    if (confirm(`Delete category "${cat}"? Items will become Uncategorized.`)) {
                        const newCats = state.categories.filter(c => c !== cat);
                        if (!newCats.includes("Uncategorized")) newCats.push("Uncategorized");
                        await setDoc(configRef, { list: newCats });
                        
                        const batch = writeBatch(db);
                        state.items.filter(i => i.category === cat).forEach(item => {
                            batch.update(doc(db, "shopping_matrix_inventory", item.id), { category: "Uncategorized" });
                        });
                        await batch.commit();
                    }
                };

                row.appendChild(input);
                if (cat !== "Uncategorized") row.appendChild(delBtn);
                catList.appendChild(row);
            });

            displayItems.forEach(item => {
                const row = document.createElement('div');
                row.className = 'manage-row';

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.className = 'manage-input';
                nameInput.value = item.name;
                nameInput.onblur = async () => {
                    const newName = nameInput.value.trim();
                    if (newName && newName !== item.name) {
                        await updateDoc(doc(db, "shopping_matrix_inventory", item.id), { name: newName });
                    }
                };

                const catSelect = document.createElement('select');
                catSelect.className = 'manage-select';
                displayCategories.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.textContent = cat;
                    if (item.category === cat) opt.selected = true;
                    catSelect.appendChild(opt);
                });
                catSelect.onchange = async () => {
                    await updateDoc(doc(db, "shopping_matrix_inventory", item.id), { category: catSelect.value });
                };

                const delBtn = document.createElement('button');
                delBtn.className = 'icon-btn';
                delBtn.innerHTML = '×';
                delBtn.onclick = async () => {
                    await deleteDoc(doc(db, "shopping_matrix_inventory", item.id));
                };

                row.appendChild(nameInput);
                row.appendChild(catSelect);
                row.appendChild(delBtn);
                itemList.appendChild(row);
            });
        }

        // --- 4. EVENT LISTENERS ---
        document.getElementById('toggle-view-btn').addEventListener('click', (e) => {
            state.isManageMode = !state.isManageMode;
            document.getElementById('shop-board').classList.toggle('hidden');
            document.getElementById('manage-board').classList.toggle('hidden');
            
            const form = document.getElementById('custom-entry-form');
            const toggleBtn = document.getElementById('toggle-view-btn'); 
            
            if (state.isManageMode) {
                toggleBtn.innerHTML = '<i class="fa-solid fa-arrow-left"></i> Shop';
                form.style.display = 'none'; 
                renderManageBoard();
            } else {
                toggleBtn.innerHTML = '<i class="fa-solid fa-gear"></i> Manage';
                form.style.display = 'flex'; 
            }
        });

        document.getElementById('add-cat-btn').addEventListener('click', async () => {
            const input = document.getElementById('new-cat-input');
            const newCat = input.value.trim();
            if (newCat && !state.categories.includes(newCat)) {
                await setDoc(configRef, { list: [...state.categories, newCat] });
                input.value = '';
            }
        });

        document.getElementById('custom-entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('custom-input');
            const itemName = input.value.trim();
            if (itemName === '') return;

            input.value = '';
            input.focus();

            if (!state.categories.includes("Uncategorized")) {
                await setDoc(configRef, { list: [...state.categories, "Uncategorized"] });
            }

            // Removed icon and fallback properties completely
            await addDoc(inventoryRef, {
                name: itemName,
                category: "Uncategorized",
                isActive: true
            });
        });

    </script>
</body>
</html>
